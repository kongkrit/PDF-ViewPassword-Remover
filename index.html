<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF Unlocker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#4f46e5">
</head>
<body>
  <main class="card">
    <h1>PDF Unlocker</h1>
    <p class="subtitle">Remove the open password from a PDF you already have access to. The file never leaves your device.</p>

    <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Drop PDF here or click to select">
      <div class="drop-icon" aria-hidden="true">📄</div>
      <div id="drop-label">Drop a PDF here, or click to select</div>
    </div>
    <input type="file" id="file-input" accept="application/pdf" aria-hidden="true">

    <div class="field">
      <label for="password">Password <span class="hint">(leave blank for permissions-only PDFs)</span></label>
      <input type="password" id="password" placeholder="Enter the PDF password" autocomplete="current-password">
    </div>

    <button id="unlock-btn" type="button">Unlock &amp; Download</button>

    <div class="status" id="status" role="status" aria-live="polite"></div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
